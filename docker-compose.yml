version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pelando_user
      POSTGRES_PASSWORD: pelando_password
      POSTGRES_DB: pelando_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5172:5172"
    environment:
      - DATABASE_URL=postgres://pelando_user:pelando_password@db:5432/pelando_db
      - PORT=5172
      # IMPORTANTE: Altere este valor para um segredo forte em produção
      - JWT_SECRET=${JWT_SECRET:-dev_secret_mude_em_producao_32chars}
      - ALLOWED_ORIGINS=${VITE_API_URL:-http://localhost:5173}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:5172}
    depends_on:
      - db
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://meninodeti.com.br:5172/api}
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

volumes:
  pgdata:
